<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">📊 Parking Dashboard</h2>

    <!-- Cards -->
    <div class="row">

        <div class="col-md-3">
            <div class="card bg-primary text-white p-3">
                <h5>Total Slots</h5>
                <h2>{{ total }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white p-3">
                <h5>Available</h5>
                <h2>{{ available }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white p-3">
                <h5>Occupied</h5>
                <h2>{{ occupied }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-dark text-white p-3">
                <h5>Total Bookings</h5>
                <h2>{{ bookings }}</h2>
            </div>
        </div>

    </div>

    <!-- Graph (Simple Text Version - No Error) -->
    <div class="mt-5">

        <h4>📊 Parking Stats</h4>

        <ul class="list-group">
            <li class="list-group-item">Total Slots: {{ total }}</li>
            <li class="list-group-item">Available Slots: {{ available }}</li>
            <li class="list-group-item">Occupied Slots: {{ occupied }}</li>
            <li class="list-group-item">Total Bookings: {{ bookings }}</li>
        </ul>

    </div>

    <br>
    <a href="/" class="btn btn-primary">Back to Home</a>

</div>

</body>
</html>
